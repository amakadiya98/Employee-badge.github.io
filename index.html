<!DOCTYPE html>
<html>
<head>
<title>Employee Voting</title>
<link rel="stylesheet" href="./css/index.css">
</head>

<body>

<div class="vote-container">

<h2 id="employeeTitle"></h2>

<div class="slider-group">
<label>Work Quality</label>
<input type="range" min="1" max="5" id="work">
</div>

<div class="slider-group">
<label>Discipline</label>
<input type="range" min="1" max="5" id="discipline">
</div>

<div class="slider-group">
<label>Office Behavior</label>
<input type="range" min="1" max="5" id="behavior">
</div>

<div class="slider-group">
<label>Overall Contribution</label>
<input type="range" min="1" max="5" id="contribution">
</div>

<button onclick="submitVote()">Submit Vote</button>

<p id="msg"></p>

</div>

<script src="./js/index.js"></script>

</body>
</html>
